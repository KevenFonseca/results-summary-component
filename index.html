<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/output.css">
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="flex justify-center items-start md:items-center h-screen bg-[hsl(221,100%,96%)]">
  <main class="font-sans font-medium text-lg">
    <!-- Results section -->
    <article class="grid grid-cols-1 md:grid-cols-2 max-w-sm md:max-w-3xl bg-white rounded-4xl shadow-2xl">
      <section class="flex flex-col items-center justify-center p-8 md:p-10 bg-linear-to-b from-[hsl(252,100%,67%)] to-[hsl(241,81%,54%)] rounded-bl-4xl rounded-br-4xl md:rounded-4xl">
        <h1 class="mb-4 md:text-xl text-[hsl(241,100%,89%)]">Your Result</h1>

        <div class="flex justify-center items-center size-35 md:size-50 bg-linear-to-b from-[hsla(256,72%,46%,1)] to-[hsla(241,72%,46%,0)] rounded-full">
          <div class="text-center">
            <strong class="block mt-4 text-6xl md:text-8xl text-white">76</strong> 
            <span class="text-sm md:text-xl text-[hsl(241,100%,89%)]">of 100</span>
          </div>
        </div>
        
        <h2 class="mt-6 md:mt-8 text-2xl md:text-3xl font-bold text-white">Great</h2>

        <p class="mx-2 mt-2 text-center text-pretty text-[hsl(241,100%,89%)]">You scored higher than 65% of the people who have taken these tests.</p>
      </section>

      <!-- Summary section -->
      <section class="p-8">
        <h2 class="font-extrabold text-[hsl(224,30%,27%)]">Summary</h2>

        <ul class="flex flex-col gap-3 my-4">
          <li class="flex justify-between p-4 bg-red-50 rounded-xl">
            <div class="flex items-center">
              <ion-icon class="text-[hsl(0,100%,67%)]" name="flash-outline" aria-hidden="true"></ion-icon>
              <span class="pl-2 text-[hsl(0,100%,67%)]">Reaction</span>
            </div>
            <div><strong class="font-bold">80</strong> <span class="text-[hsl(241,100%,89%)]">/ 100</span></div>
          </li>
          <li class="flex justify-between p-4 bg-yellow-50 rounded-xl">
            <div class="flex items-center">
              <ion-icon class="text-[hsl(39,100%,56%)]" name="bulb-outline" aria-hidden="true"></ion-icon>
              <span class="pl-2 text-[hsl(39,100%,56%)]">Memory</span>
            </div>
            <div><strong class="font-bold">92</strong> <span class="text-[hsl(241,100%,89%)]">/ 100</span></div>
          </li>
          <li class="flex justify-between p-4 bg-green-50 rounded-xl">
            <div class="flex items-center">
              <ion-icon class="text-[hsl(166,100%,37%)]" name="chatbubble-ellipses-outline" aria-hidden="true"></ion-icon>
              <span class="pl-2 text-[hsl(166,100%,37%)]">Verbal</span>
            </div>
            <div><strong class="font-bold">61</strong> <span class="text-[hsl(241,100%,89%)]">/ 100</span></div>
          </li>
          <li class="flex justify-between p-4 bg-blue-50 rounded-xl">
            <div class="flex items-center">
              <ion-icon class="text-[hsl(234,85%,45%)]" name="eye-outline" aria-hidden="true"></ion-icon>
              <span class="pl-2 text-[hsl(234,85%,45%)]">Visual</span>
            </div>
            <div><strong class="font-bold">72</strong> <span class="text-[hsl(241,100%,89%)]">/ 100</span></div>
          </li>
        </ul>

        <a class="inline-block w-full p-4 mt-2 text-center text-white bg-[hsl(224,30%,27%)] rounded-4xl transition-all duration-300 hover:opacity-90 hover:bg-linear-to-b hover:from-[hsla(256,72%,46%,1)] hover:to-[hsla(241,72%,46%,0)] hover:text-xl" href="#">Continue</a>
      </section>
    </article>
  </main>
  
  <!-- footer
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
