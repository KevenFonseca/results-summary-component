<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/output.css">
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <!-- Results section -->
    <article>
      <section>
        <h1>Your Result</h1>

        <div>
          <div><strong>76</strong> <span>of 100</span></div>
        </div>

        <h2>Great</h2>

        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </section>

      <!-- Summary section -->
      <section>
        <h2>Summary</h2>

        <ul>
          <li>
            <ion-icon name="flash-outline" aria-hidden="true"></ion-icon>
            <span>Reaction</span>
            <div><strong>80</strong> <span>/ 100</span></div>
          </li>
          <li>
            <ion-icon name="bulb-outline" aria-hidden="true"></ion-icon>
            <span>Memory</span>
            <div><strong>92</strong> <span>/ 100</span></div>
          </li>
          <li>
            <ion-icon name="chatbubble-ellipses-outline" aria-hidden="true"></ion-icon>
            <span>Verbal</span>
            <div><strong>61</strong> <span>/ 100</span></div>
          </li>
          <li>
            <ion-icon name="eye-outline" aria-hidden="true"></ion-icon>
            <span>Visual</span>
            <div><strong>72</strong> <span>/ 100</span></div>
          </li>
        </ul>

        <a href="#">Continue</a>
      </section>
    </article>
  </main>
  
  <!-- footer -->
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
